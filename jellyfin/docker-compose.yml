services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    # Optional - specify the uid and gid you would like Jellyfin to use instead of root
    user: ${JELLYFIN_UID}:${JELLYFIN_GID}
    ports:
     - 8096:8096/tcp
     - 7359:7359/udp
    volumes:
      - ${SRV_DIR}/jellyfin/config:/config
      - ${SRV_DIR}/jellyfin/cache:/cache
      - ${LIBRARY_DIR}/video/movies:/mnt/movies
      - ${LIBRARY_DIR}/video/shows:/mnt/shows
      - ${LIBRARY_DIR}/music:/music
    restart: 'unless-stopped'
    # Optional - alternative address used for autodiscovery
    environment:
      - "JELLYFIN_PublishedServerUrl=https://jellyfin.${DOMAIN_NAME}"
    # Optional - may be necessary for docker healthcheck to pass if running in host network mode
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - proxy
      - media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.tls=true"
      - "traefik.http.routers.jellyfin.tls.certresolver=${CERT_RESOLVER}"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN_NAME}`)"
      - "traefik.http.routers.jellyfin.service=jellyfin-svc"
      - "traefik.http.services.jellyfin-svc.loadbalancer.server.port=8096"
      - "traefik.docker.network=proxy"
      - "traefik.docker.network=media"

  jellyseerr:
    image: ghcr.io/fallenbagel/jellyseerr:latest
    init: true
    container_name: jellyseerr
    environment:
      - LOG_LEVEL=debug
      - "TZ=${TZ}"
      - PORT=5055 #optional
    ports:
      - 5055:5055
    volumes:
      - ${SRV_DIR}/jellyseerr/config:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
    networks:
      - proxy
      - media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyseerr.tls=true"
      - "traefik.http.routers.jellyseerr.tls.certresolver=${CERT_RESOLVER}"
      - "traefik.http.routers.jellyseerr.entrypoints=websecure"
      - "traefik.http.routers.jellyseerr.rule=Host(`jellyseerr.${DOMAIN_NAME}`)"
      - "traefik.http.routers.jellyseerr.service=jellyseerr-svc"
      - "traefik.http.services.jellyseerr-svc.loadbalancer.server.port=5055"
      - "traefik.docker.network=media"
      - "traefik.docker.network=proxy"

  jellyswarrm:
    image: ghcr.io/llukas22/jellyswarrm:latest
    container_name: jellyswarrm
    restart: unless-stopped
    ports:
      - 3000:3000
    volumes:
      - ${SWARM_SRV_DIR}/jellyswarrm
    environment:
      - JELLYSWARRM_USERNAME=${JELLYSWARRM_USERNAME}
      - JELLYSWARRM_PASSWORD=${JELLYSWARRM_PASSWORD}
    networks:
      - proxy
      - media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyswarrm.tls=true"
      - "traefik.http.routers.jellyswarrm.tls.certresolver=${CERT_RESOLVER}"
      - "traefik.http.routers.jellyswarrm.entrypoints=websecure"
      - "traefik.http.routers.jellyswarrm.rule=Host(`jellyswarrm.${DOMAIN_NAME}`)"
      - "traefik.http.routers.jellyswarrm.service=jellyswarrm-svc"
      - "traefik.http.services.jellyswarrm-svc.loadbalancer.server.port=3000"
      - "traefik.docker.network=media"
      - "traefik.docker.network=proxy"

networks:
  proxy:
    external: true
  media:
    external: true
